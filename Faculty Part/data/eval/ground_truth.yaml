    keywords_any: ["claim", "submit", "reimbursement"]

  - id: proc-update-profile
    query: "How do I update my faculty profile?"
    intent_expected: procedure
    document_expected: ""
    keywords_any: ["profile", "update"]
    notes: "May not exist in the corpus — tests graceful 'no answer' response."

  # --- Definition questions -----------------------------------------------
  - id: def-sabbatical
    query: "Define sabbatical leave"
    intent_expected: definition
    document_expected: "Employee_Resource_Book"
    keywords_any: ["sabbatical"]

  - id: def-casual-leave
    query: "What does casual leave mean?"
    intent_expected: definition
    document_expected: "Employee_Resource_Book"
    keywords_any: ["casual", "leave"]

  - id: def-loss-of-pay
    query: "What is the definition of loss of pay?"
    intent_expected: definition
    document_expected: "Employee_Resource_Book"
    keywords_any: ["loss", "pay"]

  # --- Out-of-scope / negative controls ----------------------------------
  - id: oos-weather
    query: "What's the weather in Mumbai today?"
    intent_expected: general
    document_expected: ""
    keywords_any: ["don't", "don't have", "not available", "no information"]
    notes: "Out of scope — should fall back gracefully."

  - id: oos-stock-price
    query: "What is Anthropic's stock price?"
    intent_expected: general
    document_expected: ""
    keywords_any: ["don't", "don't have", "not available", "no information"]
    notes: "Out of scope — should fall back gracefully."
